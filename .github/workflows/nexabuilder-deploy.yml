# NEXABUILDER_SLOT_DEPLOY_WORKFLOW_V1 contract=1
name: NexaBuilder slot deploy

on:
  workflow_dispatch:
    inputs:
      slot_id:
        description: NexaBuilder project (slot) id
        required: true
        type: string
      environment:
        description: Environment name (e.g. staging)
        required: true
        type: string
      initiated_by:
        description: Operator email or id
        required: false
        type: string
      project_slug:
        required: false
        type: string
      primary_domain:
        required: false
        type: string
      health_check_url:
        required: false
        type: string
      target_type:
        required: true
        type: string
      aws_region:
        required: true
        type: string
      ecr_repository:
        required: true
        type: string
      ecs_cluster:
        required: true
        type: string
      ecs_service:
        required: true
        type: string
      task_definition_family:
        required: true
        type: string
      container_name:
        required: true
        type: string
      github_environment_name:
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: nexabuilder-slot-${{ github.event.inputs.slot_id }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Dockerfile
        run: |
          test -f Dockerfile || (echo "::error::Add a Dockerfile at the repo root for ECS image builds." && exit 1)

      - name: Map workflow inputs to environment
        run: |
          echo "AWS_REGION=${{ github.event.inputs.aws_region }}" >> "$GITHUB_ENV"
          echo "ECR_REPOSITORY=${{ github.event.inputs.ecr_repository }}" >> "$GITHUB_ENV"
          echo "ECS_CLUSTER=${{ github.event.inputs.ecs_cluster }}" >> "$GITHUB_ENV"
          echo "ECS_SERVICE=${{ github.event.inputs.ecs_service }}" >> "$GITHUB_ENV"
          echo "TASK_DEFINITION_FAMILY=${{ github.event.inputs.task_definition_family }}" >> "$GITHUB_ENV"
          echo "CONTAINER_NAME=${{ github.event.inputs.container_name }}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${{ github.sha }}" >> "$GITHUB_ENV"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ github.event.inputs.aws_region }}

      - name: Ensure ECR repository exists
        run: |
          set -euo pipefail
          if ! aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" --region "$AWS_REGION" >/dev/null 2>&1; then
            aws ecr create-repository --repository-name "$ECR_REPOSITORY" --region "$AWS_REGION" >/dev/null
          fi

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve ECR registry
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "ECR_REGISTRY=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Load current ECS task definition
        run: |
          set -euo pipefail
          CURRENT_TASK_DEF=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --region "$AWS_REGION" \
            --query "services[0].taskDefinition" \
            --output text 2>/dev/null || true)
          if [ -z "$CURRENT_TASK_DEF" ] || [ "$CURRENT_TASK_DEF" = "None" ]; then
            CURRENT_TASK_DEF="$TASK_DEFINITION_FAMILY"
          fi
          aws ecs describe-task-definition \
            --task-definition "$CURRENT_TASK_DEF" \
            --region "$AWS_REGION" \
            --query taskDefinition \
            --output json > current-task-definition.json

      - name: Patch container image
        run: |
          set -euo pipefail
          jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' \
            current-task-definition.json > task-def-clean.json
          IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          jq --arg IMAGE "$IMAGE" --arg NAME "$CONTAINER_NAME" \
            '(.containerDefinitions[] | select(.name == $NAME)) |= (.image = $IMAGE)' \
            task-def-clean.json > task-def-updated.json

      - name: Register task definition
        id: register
        run: |
          set -euo pipefail
          ARN=$(aws ecs register-task-definition \
            --cli-input-json file://task-def-updated.json \
            --region "$AWS_REGION" \
            --query taskDefinition.taskDefinitionArn \
            --output text)
          echo "task_def_arn=$ARN" >> "$GITHUB_OUTPUT"

      - name: Deploy ECS service
        run: |
          set -euo pipefail
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "${{ steps.register.outputs.task_def_arn }}" \
            --force-new-deployment \
            --region "$AWS_REGION"

      - name: Wait for service stability
        run: |
          set -euo pipefail
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --region "$AWS_REGION"
